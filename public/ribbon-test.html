<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #e8e8e8; }
.container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.ribbon { position: absolute; top: 0; right: 0; width: 600px; height: 440px; }
#coords { position: fixed; bottom: 10px; left: 10px; background: #fff; padding: 10px; font-family: monospace; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
    
    <div class="ribbon">
        <svg id="ribbonSvg" viewBox="0 0 600 440" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <defs>
                <filter id="s" x="-10%" y="-10%" width="120%" height="120%">
                    <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
                </filter>
            </defs>

            <g filter="url(#s)">
                <!-- GREEN stripe -->
                <path d="M 80,-10
                         C 110,20  140,60  170,100
                         C 200,140  260,140  310,90
                         C 350,45  390,45  420,90
                         C 450,135  480,135  515,90
                         C 550,45  580,65  610,110"
                      stroke="#009639" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- RED stripe (id for JS measurement) -->
                <path id="redPath" d="M 100,-10
                         C 130,20  160,60  190,100
                         C 220,140  280,140  330,90
                         C 370,45  410,45  440,90
                         C 470,135  500,135  535,90
                         C 570,45  600,65  630,110"
                      stroke="#CE1126" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- YELLOW stripe -->
                <path d="M 120,-10
                         C 150,20  180,60  210,100
                         C 240,140  300,140  350,90
                         C 390,45  430,45  460,90
                         C 490,135  520,135  555,90
                         C 590,45  620,65  650,110"
                      stroke="#FCD116" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </g>

            <!-- Stars will be placed here by JavaScript -->
            <g id="starGroup"></g>
        </svg>
    </div>
</div>
<div id="coords">Loading...</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const svg = document.getElementById('ribbonSvg');
    const redPath = document.getElementById('redPath');
    const starGroup = document.getElementById('starGroup');
    const coordsDiv = document.getElementById('coords');

    const totalLen = redPath.getTotalLength();

    // Place stars at 10%, 55%, 72% of path length (on the straight sections of the red stripe)
    const fractions = [0.10, 0.55, 0.72];
    const positions = [];

    fractions.forEach((frac, i) => {
        const len = totalLen * frac;
        const pt = redPath.getPointAtLength(len);

        positions.push({ x: pt.x.toFixed(1), y: pt.y.toFixed(1), frac });

        // Create star group
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', `translate(${pt.x.toFixed(1)}, ${pt.y.toFixed(1)})`);

        // White background circle for contrast
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('r', '9');
        circle.setAttribute('fill', 'white');
        circle.setAttribute('opacity', '0.5');
        g.appendChild(circle);

        // Star polygon
        const star = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        star.setAttribute('points', '0,-8 1.9,-2.6 7.6,-2.6 2.9,1 4.7,6 0,2.3 -4.7,6 -2.9,1 -7.6,-2.6 -1.9,-2.6');
        star.setAttribute('fill', '#FCD116');
        star.setAttribute('stroke', '#fff');
        star.setAttribute('stroke-width', '1');
        g.appendChild(star);

        // Debug: tiny red dot at exact center
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('r', '2');
        dot.setAttribute('fill', 'red');
        g.appendChild(dot);

        starGroup.appendChild(g);
    });

    coordsDiv.innerHTML = `Total path length: ${totalLen.toFixed(1)}px<br>` +
        positions.map((p, i) => `Star ${i}: (${p.x}, ${p.y}) at ${(p.frac*100).toFixed(0)}%`).join('<br>');
});
</script>
</body>
</html>
